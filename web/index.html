<!DOCTYPE html>
<html lang="en-ZA">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>West Coast Picker — Live Auctions</title>
    <meta name="description" content="West Coast Picker — South Africa's live auction marketplace. Bid on vehicles, livestock, property, electronics and more." />

    <!-- PWA -->
    <meta name="theme-color" content="#0D1B2A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WC Online Auction" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192-v5.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192-v5.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512-v5.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="BidWave — Live Auctions" />
    <meta property="og:description" content="South Africa's trusted live and timed auction marketplace." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (e) {
            console.warn('SW registration failed:', e);
          });
        });
      }
    </script>
  </body>
</html>
